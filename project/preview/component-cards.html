<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Cards</title>
<link rel="stylesheet" href="_card-base.css"/>
<style>
  body { background: #FAF6EE; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .lcard { background: #F5EFE2; border: 1px solid #D9CFB8; border-radius: 12px; padding: 18px; transition: all 200ms; }
  .lcard.hover { border-color: #2F6B4F; border-width: 2px; padding: 17px; box-shadow: 0 2px 6px rgba(60,40,20,0.08); }
  .eyebrow { font-family: var(--font-ui); font-size: 10.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #6B5E4E; }
  .title { font-family: var(--font-display); font-size: 20px; font-weight: 500; color: #1F1A14; margin-top: 6px; line-height: 1.25;}
  .meta { font-family: var(--font-ui); font-size: 12px; color: #6B5E4E; margin-top: 8px; display:flex; gap: 12px; align-items:center;}
  .progress { height: 4px; background: #E8DDC4; border-radius: 2px; overflow: hidden; margin-top: 12px;}
  .progress > div { height: 100%; background: #2F6B4F; }
  .pill { padding: 2px 8px; border-radius: 999px; background: #DDE9DF; color: #16382A; font-size: 11px; font-weight: 600;}
</style>
</head>
<body class="ftt">
  <div class="card">
    <div class="grid">
      <div class="lcard">
        <div class="eyebrow">Chapter 9 · Lesson 3 of 12</div>
        <div class="title">Contributing property — and the §721 rule</div>
        <div class="meta"><span>~ 8 min</span> · <span class="pill">In progress</span></div>
        <div class="progress"><div style="width:35%"></div></div>
      </div>
      <div class="lcard hover">
        <div class="eyebrow">Chapter 10 · Practice</div>
        <div class="title">Hot-asset distributions, three ways</div>
        <div class="meta"><span>5 problems</span> · <span class="pill" style="background:#FAEEC6;color:#7A5E16;">Needs review</span></div>
        <div class="progress"><div style="width:80%; background:#E8B84A;"></div></div>
      </div>
    </div>
  </div>
</body>
</html>
