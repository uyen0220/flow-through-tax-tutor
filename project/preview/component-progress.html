<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Progress</title>
<link rel="stylesheet" href="_card-base.css"/>
<style>
  .row { display: flex; flex-direction: column; gap: 16px; }
  .item { display: flex; flex-direction: column; gap: 6px; }
  .lbl { display: flex; justify-content: space-between; font-family: var(--font-ui); font-size: 12px; color: var(--ink-1);}
  .lbl strong { font-weight: 600; color: var(--ink); }
  .lbl .pct { font-family: var(--font-mono); color: var(--ink-2); }
  .bar { height: 8px; background: #EFE7D4; border-radius: 4px; overflow: hidden;}
  .bar > div { height: 100%; background: #2F6B4F; border-radius: 4px;}
  .bar.warn > div { background: #E8B84A; }
  .dots { display: flex; gap: 6px; align-items: center; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: #EFE7D4; border: 1px solid #D9CFB8;}
  .dot.done { background: #2F6B4F; border-color: #2F6B4F;}
  .dot.curr { background: #E8B84A; border-color: #E8B84A;}
</style>
</head>
<body class="ftt">
  <div class="card">
    <div class="row">
      <div class="item">
        <div class="lbl"><strong>Chapter 9 · Partnerships: Formation</strong><span class="pct">68%</span></div>
        <div class="bar"><div style="width:68%"></div></div>
      </div>
      <div class="item">
        <div class="lbl"><strong>Chapter 10 · Distributions</strong><span class="pct">23%</span></div>
        <div class="bar warn"><div style="width:23%"></div></div>
      </div>
      <div class="item">
        <div class="lbl"><strong>Lesson · Outside basis walkthrough</strong><span class="pct">step 4 of 7</span></div>
        <div class="dots">
          <div class="dot done"></div>
          <div class="dot done"></div>
          <div class="dot done"></div>
          <div class="dot curr"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
