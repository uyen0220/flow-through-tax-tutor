<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Spacing scale</title>
<link rel="stylesheet" href="_card-base.css"/>
<style>
  .row { display: flex; flex-direction: column; gap: 6px; }
  .line { display: flex; align-items: center; gap: 14px; }
  .name { font-family: var(--font-mono); font-size: 11px; width: 64px; color: var(--ink-1); }
  .px { font-family: var(--font-ui); font-size: 11px; color: var(--ink-2); width: 40px; text-align: right; }
  .bar { height: 8px; background: #2F6B4F; border-radius: 2px; }
</style>
</head>
<body class="ftt">
  <div class="card">
    <div class="row">
      <div class="line"><div class="name">--sp-1</div><div class="px">4</div><div class="bar" style="width: 4px;"></div></div>
      <div class="line"><div class="name">--sp-2</div><div class="px">8</div><div class="bar" style="width: 8px;"></div></div>
      <div class="line"><div class="name">--sp-3</div><div class="px">12</div><div class="bar" style="width: 12px;"></div></div>
      <div class="line"><div class="name">--sp-4</div><div class="px">16</div><div class="bar" style="width: 16px;"></div></div>
      <div class="line"><div class="name">--sp-5</div><div class="px">20</div><div class="bar" style="width: 20px;"></div></div>
      <div class="line"><div class="name">--sp-6</div><div class="px">24</div><div class="bar" style="width: 24px;"></div></div>
      <div class="line"><div class="name">--sp-8</div><div class="px">32</div><div class="bar" style="width: 32px;"></div></div>
      <div class="line"><div class="name">--sp-10</div><div class="px">40</div><div class="bar" style="width: 40px;"></div></div>
      <div class="line"><div class="name">--sp-12</div><div class="px">48</div><div class="bar" style="width: 48px;"></div></div>
      <div class="line"><div class="name">--sp-16</div><div class="px">64</div><div class="bar" style="width: 64px;"></div></div>
      <div class="line"><div class="name">--sp-20</div><div class="px">80</div><div class="bar" style="width: 80px;"></div></div>
      <div class="line"><div class="name">--sp-24</div><div class="px">96</div><div class="bar" style="width: 96px;"></div></div>
    </div>
  </div>
</body>
</html>
