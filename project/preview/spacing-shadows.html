<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Shadows</title>
<link rel="stylesheet" href="_card-base.css"/>
<style>
  body { background: #FAF6EE; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; padding: 14px 0; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 100%; max-width: 140px; height: 80px; background: #FFFCF5; border-radius: 12px; border: 1px solid #EDE4CF; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--ink-1); }
  .desc { font-family: var(--font-ui); font-size: 11px; color: var(--ink-2); text-align: center; }
</style>
</head>
<body class="ftt">
  <div class="card">
    <div class="row">
      <div class="item"><div class="box" style="box-shadow: 0 1px 2px rgba(60,40,20,0.06);"></div><div class="name">--shadow-xs</div><div class="desc">resting hint</div></div>
      <div class="item"><div class="box" style="box-shadow: 0 2px 6px rgba(60,40,20,0.08), 0 1px 2px rgba(60,40,20,0.04);"></div><div class="name">--shadow-sm</div><div class="desc">hover lift</div></div>
      <div class="item"><div class="box" style="box-shadow: 0 8px 20px rgba(60,40,20,0.10), 0 2px 6px rgba(60,40,20,0.06);"></div><div class="name">--shadow-md</div><div class="desc">popovers</div></div>
      <div class="item"><div class="box" style="box-shadow: 0 18px 40px rgba(60,40,20,0.14), 0 4px 10px rgba(60,40,20,0.08);"></div><div class="name">--shadow-lg</div><div class="desc">modals</div></div>
    </div>
  </div>
</body>
</html>
