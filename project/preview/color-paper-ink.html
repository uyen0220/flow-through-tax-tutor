<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Paper & ink</title>
<link rel="stylesheet" href="_card-base.css"/>
<style>
  body { background: #FFFDF8; }
  .swatches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { width: 100%; height: 60px; border-radius: 12px; border: 1px solid rgba(27,58,107,0.08); }
  .label { font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; color: #1B3A6B; }
  .hex { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #6B7A95; }
  .group { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: #6B7A95; margin-bottom: 10px; }
</style>
</head>
<body class="ftt">
  <div class="card">
    <div class="group">Paper · canvas & surfaces</div>
    <div class="swatches" style="margin-bottom: 18px;">
      <div class="sw"><div class="chip" style="background:#FFFDF8"></div><div class="label">paper</div><div class="hex">#FFFDF8</div></div>
      <div class="sw"><div class="chip" style="background:#FAF6EC"></div><div class="label">paper-1</div><div class="hex">#FAF6EC</div></div>
      <div class="sw"><div class="chip" style="background:#F2ECDB"></div><div class="label">paper-2</div><div class="hex">#F2ECDB</div></div>
      <div class="sw"><div class="chip" style="background:#E8DFC8"></div><div class="label">paper-3</div><div class="hex">#E8DFC8</div></div>
      <div class="sw"><div class="chip" style="background:#F1F2F5"></div><div class="label">ink-6</div><div class="hex">#F1F2F5</div></div>
      <div class="sw"><div class="chip" style="background:#E4E7ED"></div><div class="label">ink-5</div><div class="hex">#E4E7ED</div></div>
    </div>
    <div class="group">Ink · brand blue ramp</div>
    <div class="swatches">
      <div class="sw"><div class="chip" style="background:#1B3A6B"></div><div class="label" style="color:#1B3A6B">ink</div><div class="hex">#1B3A6B</div></div>
      <div class="sw"><div class="chip" style="background:#2C4A7A"></div><div class="label">ink-1</div><div class="hex">#2C4A7A</div></div>
      <div class="sw"><div class="chip" style="background:#6B7A95"></div><div class="label">ink-2</div><div class="hex">#6B7A95</div></div>
      <div class="sw"><div class="chip" style="background:#A8B1C2"></div><div class="label">ink-3</div><div class="hex">#A8B1C2</div></div>
      <div class="sw"><div class="chip" style="background:#C9CFDA"></div><div class="label">ink-4</div><div class="hex">#C9CFDA</div></div>
      <div class="sw"><div class="chip" style="background:#FFFDF8;border-color:#A8B1C2"></div><div class="label">on-paper</div><div class="hex">contrast</div></div>
    </div>
  </div>
</body>
</html>
