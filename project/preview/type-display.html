<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Display type — Nunito</title>
<link rel="stylesheet" href="_card-base.css"/>
<style>
  body { background: #FFFDF8; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .h { font-family: 'Nunito', sans-serif; color: #1B3A6B; letter-spacing: -0.01em; line-height: 1.05;}
  .meta { font-family: 'Nunito', sans-serif; font-size: 11px; color: #6B7A95; font-weight: 600; display: flex; gap: 12px; margin-top: 4px;}
</style>
</head>
<body class="ftt">
  <div class="card">
    <div class="stack">
      <div>
        <div class="h" style="font-size: 52px; font-weight: 900;">Tax doesn't have to be scary.</div>
        <div class="meta"><span>H1 · Nunito 900</span><span>52px · -0.01em</span></div>
      </div>
      <div>
        <div class="h" style="font-size: 32px; font-weight: 800;">Partner's outside basis</div>
        <div class="meta"><span>H2 · Nunito 800</span><span>32px</span></div>
      </div>
      <div>
        <div class="h" style="font-size: 22px; font-weight: 700;">A worked example</div>
        <div class="meta"><span>H3 · Nunito 700</span><span>22px</span></div>
      </div>
    </div>
  </div>
</body>
</html>
