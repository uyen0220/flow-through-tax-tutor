<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Inputs</title>
<link rel="stylesheet" href="_card-base.css"/>
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-family: var(--font-ui); font-size: 12px; font-weight: 600; color: var(--ink-1); }
  .input { font-family: var(--font-body); font-size: 15px; padding: 10px 12px; border-radius: 8px; border: 1px solid #9C8E7B; background: #FFFCF5; color: #1F1A14; outline: none; transition: all 200ms; }
  .input:focus, .input.focus { border-color: #2F6B4F; box-shadow: 0 0 0 2px rgba(47,107,79,0.25); }
  .input.err { border-color: #B5462E; box-shadow: 0 0 0 2px rgba(181,70,46,0.18); }
  .help { font-family: var(--font-ui); font-size: 12px; color: var(--ink-2); }
  .help.err { color: #B5462E; }
  textarea.input { font-family: var(--font-body); resize: vertical; min-height: 60px;}
  .check { display: flex; align-items: center; gap: 8px; font-family: var(--font-ui); font-size: 14px; color: var(--ink); }
  .box { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid #6B5E4E; display: flex; align-items: center; justify-content: center; }
  .box.on { background: #2F6B4F; border-color: #2F6B4F; color: #FAF6EE; }
</style>
</head>
<body class="ftt">
  <div class="card">
    <div class="grid">
      <div class="field">
        <div class="lbl">Email</div>
        <input class="input" value="lila@school.edu"/>
        <div class="help">We'll send a magic link, no password.</div>
      </div>
      <div class="field">
        <div class="lbl">Outside basis (focus)</div>
        <input class="input focus" value="$ 12,500"/>
        <div class="help">Numerals only.</div>
      </div>
      <div class="field">
        <div class="lbl">Tax year</div>
        <input class="input err" value="20266"/>
        <div class="help err">Looks like a typo — did you mean 2026?</div>
      </div>
      <div class="field">
        <div class="lbl">Notes</div>
        <textarea class="input">§704(b) cares about economic reality…</textarea>
      </div>
    </div>
    <div style="display:flex; gap: 18px; margin-top: 14px;">
      <label class="check"><span class="box on">✓</span> Use Source Serif 4 for body</label>
      <label class="check"><span class="box"></span> Always show citations</label>
    </div>
  </div>
</body>
</html>
