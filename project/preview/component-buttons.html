<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Buttons</title>
<link rel="stylesheet" href="_card-base.css"/>
<style>
  body { background: #FFFDF8; font-family: 'Nunito', sans-serif;}
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; align-items: start; }
  .col { display: flex; flex-direction: column; gap: 10px; align-items: flex-start;}
  .label { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: #6B7A95; margin-bottom: 4px;}
  .btn { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; padding: 10px 18px; border-radius: 10px; border: 2px solid transparent; cursor: pointer; }
  .btn.primary { background: #FBC02D; color: #1B1300; }
  .btn.primary.hover { background: #F0B41E; }
  .btn.primary.press { background: #DDA50C; transform: scale(0.98); }
  .btn.secondary { background: #1B3A6B; color: #FFFDF8;}
  .btn.ghost { background: transparent; color: #1B3A6B; border-color: #1B3A6B; }
  .btn.subtle { background: #F2ECDB; color: #1B3A6B; }
  .btn.danger { background: #D24545; color: #fff; }
  .btn.disabled { background: #F1F2F5; color: #C9CFDA; }
  .btn.lg { font-size: 16px; padding: 14px 26px; border-radius: 12px;}
  .btn.sm { font-size: 13px; padding: 6px 12px; border-radius: 8px;}
</style>
</head>
<body class="ftt">
  <div class="card">
    <div class="grid">
      <div class="col">
        <div class="label">Primary CTA · yellow</div>
        <button class="btn primary lg">Continue lesson</button>
        <button class="btn primary">Continue</button>
        <button class="btn primary press">Press</button>
      </div>
      <div class="col">
        <div class="label">Secondary · ghost</div>
        <button class="btn secondary">Mark complete</button>
        <button class="btn ghost">Save for later</button>
        <button class="btn subtle">Skip</button>
      </div>
      <div class="col">
        <div class="label">Danger · sizes</div>
        <button class="btn danger">Reset progress</button>
        <button class="btn primary sm">Hint</button>
        <button class="btn disabled">Locked</button>
      </div>
    </div>
  </div>
</body>
</html>
