<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Flow Through Tax Tutor — Web App</title>
<link rel="icon" href="../../assets/logo-mark.svg"/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="ftt">
  <div id="root"></div>
  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="Dashboard.jsx"></script>
  <script type="text/babel" src="LessonReader.jsx"></script>
  <script type="text/babel" src="TutorRail.jsx"></script>
  <script type="text/babel" src="PracticeProblem.jsx"></script>
  <script type="text/babel" src="Glossary.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [view, setView] = useState('dashboard');  // dashboard | lesson | practice | glossary | progress
      const [chapter, setChapter] = useState('ch9');

      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      }, [view]);

      const showRail = view === 'lesson';

      const crumbs = (() => {
        if (view === 'dashboard') return ['Dashboard'];
        if (view === 'lesson') return ['Course', 'Chapter 9 — Partnerships', 'Lesson 3'];
        if (view === 'practice') return ['Practice', 'Chapter 9', 'Outside basis on formation'];
        if (view === 'glossary') return ['Glossary'];
        if (view === 'progress') return ['Progress'];
        return [];
      })();

      const progressPct = view === 'lesson' ? 0.45 : view === 'practice' ? 0.4 : null;

      return (
        <div className={`shell ${showRail ? '' : 'no-rail'}`} data-screen-label={view}>
          <LeftNav activeView={view} onNav={setView} activeChapter={chapter} onChapter={setChapter}/>
          <div className="main">
            <TopBar crumbs={crumbs} progress={progressPct}/>
            {view === 'dashboard' && <Dashboard onOpenLesson={() => setView('lesson')} onOpenPractice={() => setView('practice')}/>}
            {view === 'lesson' && <LessonReader onBack={() => setView('dashboard')} onNext={() => setView('practice')} onOpenPractice={() => setView('practice')}/>}
            {view === 'practice' && <PracticeProblem onBack={() => setView('lesson')}/>}
            {view === 'glossary' && <Glossary/>}
            {view === 'progress' && (
              <div className="dash">
                <h1>Progress</h1>
                <div className="greeting-sub">Stub view — chapter mastery, attempt history, and time-to-CPA estimates live here.</div>
              </div>
            )}
          </div>
          {showRail && <div className="rail"><TutorRail/></div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
